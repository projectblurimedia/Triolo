name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

defaults:
  run:
    working-directory: backend

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Boot smoke test
        # tsc alone doesn't rewrite "@/" path aliases in the compiled output, so a
        # clean build can still crash at runtime (MODULE_NOT_FOUND) in ways typecheck
        # and unit tests never exercise. Actually boot the compiled server and hit
        # /health (no DB access needed) to catch that class of bug in CI.
        run: |
          NODE_ENV=production PORT=4000 \
          DATABASE_URL=postgres://user:pass@localhost:5432/ci_placeholder \
          JWT_ACCESS_SECRET=ci-smoke-test-secret \
          JWT_REFRESH_SECRET=ci-smoke-test-refresh-secret \
          node dist/server.js &
          SERVER_PID=$!
          success=0
          for i in $(seq 1 10); do
            if curl -sf http://localhost:4000/health > /dev/null; then
              success=1
              break
            fi
            sleep 1
          done
          kill $SERVER_PID 2>/dev/null || true
          if [ "$success" -ne 1 ]; then
            echo "Server failed to boot and respond on /health within 10s"
            exit 1
          fi
          echo "Boot smoke test passed"
